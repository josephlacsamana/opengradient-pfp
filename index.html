<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenGradient PFP Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #6c63ff;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(90deg, #6c63ff, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #888;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .card {
      background: #13131a;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 1.5rem;
    }

    .upload-zone {
      border: 2px dashed #3a3a5c;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #6c63ff;
      background: #1a1a2e;
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    .upload-zone p { color: #888; font-size: 0.9rem; }
    .upload-zone .upload-label { color: #a78bfa; font-weight: 600; }

    .preview-container {
      display: none;
      margin-top: 1rem;
      text-align: center;
    }

    .preview-container img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      border: 1px solid #2a2a3a;
    }

    .preview-container .change-btn {
      margin-top: 0.5rem;
      background: none;
      border: none;
      color: #6c63ff;
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: underline;
    }

    .generate-btn {
      width: 100%;
      margin-top: 1.75rem;
      padding: 0.85rem;
      background: linear-gradient(135deg, #6c63ff, #38bdf8);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.1s;
    }

    .generate-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .generate-btn:active:not(:disabled) { transform: translateY(0); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      text-align: center;
      padding: 1rem;
      color: #888;
      font-size: 0.9rem;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #444;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card {
      display: none;
      background: #13131a;
      border: 1px solid #3a3a5c;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .result-card h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: #a78bfa;
    }

    .result-card img {
      width: 100%;
      border-radius: 12px;
      border: 2px solid #6c63ff;
      margin-bottom: 1.25rem;
    }

    .action-buttons {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-download {
      padding: 0.65rem 1.5rem;
      background: linear-gradient(135deg, #6c63ff, #38bdf8);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s;
    }

    .btn-download:hover { opacity: 0.85; }

    .btn-again {
      padding: 0.65rem 1.5rem;
      background: transparent;
      border: 1px solid #3a3a5c;
      border-radius: 8px;
      color: #aaa;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-again:hover { border-color: #6c63ff; color: #e0e0e0; }

    .cta-text {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #6c63ff;
      font-weight: 600;
    }

    .error {
      background: #2a1a1a;
      border: 1px solid #5c2a2a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #ff8080;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }

    .models-loading {
      text-align: center;
      color: #555;
      font-size: 0.8rem;
      margin-top: 1rem;
    }

    footer {
      margin-top: 2rem;
      color: #444;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <div class="logo">OpenGradient</div>
  <h1>OG PFP Generator</h1>
  <p class="subtitle">Get the OpenGradient look. Flex it on X.</p>

  <div class="card" id="uploadCard">
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" />
      <div class="upload-icon">📸</div>
      <p><span class="upload-label">Click to upload</span> or drag & drop</p>
      <p>your profile picture</p>
    </div>

    <div class="preview-container" id="previewContainer">
      <img id="previewImg" src="" alt="Your PFP" />
      <br />
      <button class="change-btn" onclick="resetUpload()">Change photo</button>
    </div>

    <div class="error" id="errorBox"></div>

    <button class="generate-btn" id="generateBtn" onclick="generate()" disabled>
      Apply OG Sunglasses
    </button>
    <p class="models-loading" id="modelsStatus">Loading face detection...</p>
  </div>

  <div class="status" id="status">
    <span class="spinner"></span>
    <span id="statusText">Detecting face...</span>
  </div>

  <div class="result-card" id="resultCard">
    <h2>Your OpenGradient PFP is ready!</h2>
    <img id="resultImg" src="" alt="Generated PFP" />
    <div class="action-buttons">
      <a class="btn-download" id="downloadBtn" href="#" download="opengradient-pfp.png">
        Download
      </a>
      <button class="btn-again" onclick="resetAll()">Try Another</button>
    </div>
    <p class="cta-text">Set it as your profile picture!</p>
  </div>

  <footer>Powered by OpenGradient</footer>

  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <script>
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';

    let modelsLoaded = false;
    let uploadedImg = null;
    let sunglassesCanvas = null;

    // Load models + sunglasses on startup
    (async function init() {
      try {
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
        ]);
        const raw = await loadImage('assets/sunglasses.png');
        sunglassesCanvas = removeWhiteBackground(raw);
        modelsLoaded = true;
        document.getElementById('modelsStatus').style.display = 'none';
        if (uploadedImg) document.getElementById('generateBtn').disabled = false;
      } catch (err) {
        document.getElementById('modelsStatus').textContent = 'Failed to load models. Try refreshing.';
        console.error(err);
      }
    })();

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function removeWhiteBackground(img, threshold = 235) {
      const c = document.createElement('canvas');
      c.width = img.naturalWidth;
      c.height = img.naturalHeight;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const imageData = ctx.getImageData(0, 0, c.width, c.height);
      const px = imageData.data;
      for (let i = 0; i < px.length; i += 4) {
        if (px[i] > threshold && px[i + 1] > threshold && px[i + 2] > threshold) {
          px[i + 3] = 0;
        }
      }
      ctx.putImageData(imageData, 0, 0);
      return c;
    }

    function avgPoint(pts) {
      return {
        x: pts.reduce((s, p) => s + p.x, 0) / pts.length,
        y: pts.reduce((s, p) => s + p.y, 0) / pts.length
      };
    }

    // Drag & drop
    const uploadZone = document.getElementById('uploadZone');
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file?.type.startsWith('image/')) handleFile(file);
    });
    document.getElementById('fileInput').addEventListener('change', e => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = async e => {
        const dataUrl = e.target.result;
        document.getElementById('previewImg').src = dataUrl;
        document.getElementById('uploadZone').style.display = 'none';
        document.getElementById('previewContainer').style.display = 'block';
        uploadedImg = await loadImage(dataUrl);
        document.getElementById('generateBtn').disabled = !modelsLoaded;
      };
      reader.readAsDataURL(file);
    }

    async function generate() {
      const btn = document.getElementById('generateBtn');
      const errorBox = document.getElementById('errorBox');
      errorBox.style.display = 'none';
      btn.disabled = true;
      document.getElementById('status').style.display = 'block';

      try {
        const detection = await faceapi
          .detectSingleFace(uploadedImg, new faceapi.TinyFaceDetectorOptions({ inputSize: 512 }))
          .withFaceLandmarks();

        if (!detection) throw new Error('No face detected. Try a clearer, front-facing photo.');

        const lm = detection.landmarks;
        const leftEye = avgPoint(lm.getLeftEye());
        const rightEye = avgPoint(lm.getRightEye());

        const dx = rightEye.x - leftEye.x;
        const dy = rightEye.y - leftEye.y;
        const angle = Math.atan2(dy, dx);
        const eyeDist = Math.hypot(dx, dy);

        // Scale sunglasses to span ~3x inter-eye distance (temple to temple)
        const glassesW = eyeDist * 3.2;
        const glassesH = glassesW * (sunglassesCanvas.height / sunglassesCanvas.width);

        // Position at eye midpoint, shifted slightly up
        const cx = (leftEye.x + rightEye.x) / 2;
        const cy = (leftEye.y + rightEye.y) / 2 - eyeDist * 0.15;

        const canvas = document.createElement('canvas');
        canvas.width = uploadedImg.naturalWidth;
        canvas.height = uploadedImg.naturalHeight;
        const ctx = canvas.getContext('2d');

        ctx.drawImage(uploadedImg, 0, 0);
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.drawImage(sunglassesCanvas, -glassesW / 2, -glassesH / 2, glassesW, glassesH);
        ctx.restore();

        showResult(canvas.toDataURL('image/png'));
      } catch (err) {
        errorBox.textContent = 'Error: ' + err.message;
        errorBox.style.display = 'block';
        btn.disabled = false;
      } finally {
        document.getElementById('status').style.display = 'none';
      }
    }

    function showResult(dataUrl) {
      document.getElementById('uploadCard').style.display = 'none';
      document.getElementById('resultImg').src = dataUrl;
      document.getElementById('downloadBtn').href = dataUrl;
      const resultCard = document.getElementById('resultCard');
      resultCard.style.display = 'block';
      resultCard.scrollIntoView({ behavior: 'smooth' });
    }

    function resetUpload() {
      uploadedImg = null;
      document.getElementById('fileInput').value = '';
      document.getElementById('uploadZone').style.display = 'block';
      document.getElementById('previewContainer').style.display = 'none';
      document.getElementById('generateBtn').disabled = true;
      document.getElementById('errorBox').style.display = 'none';
    }

    function resetAll() {
      resetUpload();
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('uploadCard').style.display = 'block';
    }
  </script>
</body>
</html>
